name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    env:
      RUSTFLAGS: -Awarnings
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux ecCodes runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin numpy pytest eccodes

      - name: Build wheel
        run: maturin build --release --interpreter python --out dist

      - name: Install built wheel
        run: |
          python -c "import pathlib, subprocess, sys; wheels = sorted(pathlib.Path('dist').glob('*.whl')); assert wheels, 'no wheel built'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(wheels[-1])])"

      - name: Run test suite
        run: pytest -q
